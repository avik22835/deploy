name: Surgical Zero-Trust Integration

on:
  repository_dispatch:
    types: [protocol_release]
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Trusted Baseline
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cleanup Linter Bait
        run: rm -f scripts/*.ts

      - name: Install Base Dependencies
        run: npm install --ignore-scripts --no-package-lock

      - name: Surgical Protocol Injection
        run: |
          OWNER="${{ github.event.client_payload.owner }}"
          BRANCH="${{ github.event.client_payload.protocol_branch }}"
          echo "[Surgical Engine] Injecting Protocol from $OWNER/$BRANCH"
          
          # 1. Install from GitHub
          npm install "github:$OWNER/protocol#$BRANCH" --ignore-scripts --no-package-lock
          
          # 2. BUILD the injected protocol (since GitHub only has /src)
          echo "[Surgical Engine] Building injected protocol..."
          cd node_modules/@metacall/protocol
          npm install --ignore-scripts
          npx tsc
          echo "[Surgical Engine] Protocol build complete."

      - name: Start Auth Proxy (The Vault)
        env:
          METACALL_API_KEY: ${{ secrets.METACALL_API_KEY }}
        run: |
          node scripts/auth_proxy.js &
          sleep 5

      - name: Run Zero-Trust Integration Tests (FORCE REVEAL)
        env:
          METACALL_API_URL: http://localhost:8080
        run: |
          # Use npx ts-node to run mocha directly on the TS files
          npx ts-node --transpile-only node_modules/mocha/bin/mocha src/test/cli.integration.spec.ts

      - name: Report Results
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          script: |
            const prNumber = context.payload.client_payload?.pr_number;
            if (prNumber) {
              const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: 'protocol',
                issue_number: parseInt(prNumber),
                body: `### Surgical Integration Report\n- **Status**: ${status}\n- **Attack Log Proof**: Check the "Run Zero-Trust" step for 'undefined' log.\n[View Detailed Logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              });
            }
